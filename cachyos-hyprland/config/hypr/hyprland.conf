# ============================================================
#  Hyprland — CachyOS (dotfile)
#  Design: WhiteSur-Dark + Vision-Black cursor + WhiteSur icons
# ============================================================

# --- Monitor ---
# Para múltiplos monitores: monitor=DP-1,1920x1080@144,0x0,1
monitor=,preferred,auto,1

# --- Autostart ---
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Variáveis de ambiente ---
env = XCURSOR_THEME,Vision-Black
env = XCURSOR_SIZE,24
env = GTK_THEME,WhiteSur-Dark
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# --- Input ---
input {
    # Layout do teclado — altere para br se usar teclado ABNT2
    kb_layout = us
    # kb_layout = br

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

# --- Visual geral ---
general {
    gaps_in  = 4
    gaps_out = 10
    border_size = 2

    # Borda ativa: cinza-azulado macOS | inativa: escuro
    col.active_border   = rgba(6c6c70ff) rgba(5e5e66ff) 45deg
    col.inactive_border = rgba(2d2d30aa)

    layout = dwindle
    resize_on_border = true
}

# --- Decoração de janelas ---
decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.96

    blur {
        enabled = true
        size    = 6
        passes  = 2
        new_optimizations = true
        xray    = false
    }

    drop_shadow      = true
    shadow_range     = 12
    shadow_render_power = 2
    col.shadow       = rgba(00000055)
    col.shadow_inactive = rgba(00000030)
}

# --- Animações ---
animations {
    enabled = true

    bezier = smooth,   0.05, 0.9,  0.1, 1.05
    bezier = linear,   0.0,  0.0,  1.0, 1.0
    bezier = snappy,   0.1,  1.0,  0.2, 1.0

    animation = windows,       1, 4,  smooth,  slide
    animation = windowsOut,    1, 3,  snappy,  popin 80%
    animation = windowsMove,   1, 3,  smooth
    animation = fade,          1, 4,  linear
    animation = workspaces,    1, 4,  smooth,  slidevert
    animation = specialWorkspace, 1, 4, smooth, slidevert
}

# --- Layout dwindle (tiling inteligente) ---
dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

# --- Misc ---
misc {
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes  = true
}

# ============================================================
#  Atalhos de teclado
# ============================================================
$mod = SUPER

# Apps
bind = $mod,       Return,  exec, kitty
bind = $mod,       T,       exec, kitty
bind = $mod,       M,       exec, firefox
bind = $mod,       Z,       exec, zed
bind = $mod,       W,       exec, warp-terminal
bind = $mod,       E,       exec, nemo

# Lançador (rofi)
bind = $mod,       SPACE,   exec, rofi -show drun
bind = $mod SHIFT, SPACE,   exec, rofi -show window

# Clipboard (histórico)
bind = $mod,       V,       exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Screenshot
bind = SHIFT ALT,  S,       exec, grimblast --notify copy area
bind = ,           Print,   exec, grimblast --notify copy screen

# Janelas
bind = $mod,       C,       killactive
bind = $mod,       F,       fullscreen, 0
bind = $mod SHIFT, F,       fullscreen, 1
bind = $mod SHIFT, V,       togglefloating
bind = $mod,       P,       pseudo

# Foco (setas e vim-keys)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H,     movefocus, l
bind = $mod, L,     movefocus, r
bind = $mod, K,     movefocus, u
bind = $mod, J,     movefocus, d

# Mover janelas
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d
bind = $mod SHIFT, H,     movewindow, l
bind = $mod SHIFT, L,     movewindow, r
bind = $mod SHIFT, K,     movewindow, u
bind = $mod SHIFT, J,     movewindow, d

# Redimensionar
binde = $mod CTRL, left,  resizeactive, -30 0
binde = $mod CTRL, right, resizeactive,  30 0
binde = $mod CTRL, up,    resizeactive,  0 -30
binde = $mod CTRL, down,  resizeactive,  0  30

# Workspaces (Super+1..9)
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

# Mover janela para workspace (Super+Shift+1..9)
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Scroll no workspace com Super+scroll
bind  = $mod, mouse_down, workspace, e+1
bind  = $mod, mouse_up,   workspace, e-1

# Arrastar e redimensionar janelas com mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle

# Brilho (requer brightnessctl)
bind = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ============================================================
#  Regras de janela
# ============================================================

# Floating para utilitários
windowrulev2 = float, class:(pavucontrol)
windowrulev2 = float, class:(nm-connection-editor)
windowrulev2 = float, class:(org.gnome.Nautilus), title:(Propriedades.*)
windowrulev2 = float, title:(Confirmar.*)
windowrulev2 = float, title:(Aviso.*)
windowrulev2 = float, title:(Abrir arquivo)
windowrulev2 = float, title:(Salvar arquivo)

# Tamanho para floating
windowrulev2 = size 700 500, class:(pavucontrol)

# Rofi sem borda
windowrulev2 = noborder, class:(rofi)
windowrulev2 = noshadow, class:(rofi)
