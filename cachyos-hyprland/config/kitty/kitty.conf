# ============================================================
#  Kitty — terminal personalizado (WhiteSur-Dark)
#  Paleta macOS dark + JetBrains Mono + transparência + tabs
# ============================================================

# --- Fonte ---
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        13.0

# Ligaduras ativas
disable_ligatures never

# Ajuste fino de espaçamento
adjust_line_height  2
adjust_column_width 0
adjust_baseline     0

# --- Cursor ---
cursor_shape           beam
cursor_beam_thickness  1.8
cursor_blink_interval  0.5
cursor_stop_blinking_after 10.0

# --- Mouse ---
mouse_hide_wait    3.0
url_color          #0a84ff
url_style          curly
open_url_with      default
detect_urls        yes
copy_on_select     no

# --- Rolagem ---
scrollback_lines      5000
scrollback_pager_history_size 0
wheel_scroll_multiplier 5.0

# --- Janela ---
remember_window_size   yes
initial_window_width   1000
initial_window_height  650

# Padding interno (respiração entre texto e borda)
window_padding_width   16

# Sem decoração de janela própria — Hyprland cuida das bordas
hide_window_decorations yes

# Transparência de fundo (0.0 = transparente total, 1.0 = opaco)
background_opacity     0.92

# Blur de fundo (requer suporte do compositor — funciona no Hyprland)
background_blur        1

# --- Abas (tabs) ---
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_bar_min_tabs       2
tab_bar_margin_width   0
tab_bar_margin_height  4 2

tab_title_template     "{fmt.fg._6c6c70}{index}{fmt.fg.tab}:{fmt.bold} {title[:20]}"

active_tab_font_style   bold
inactive_tab_font_style normal

# --- Bell ---
enable_audio_bell  no
visual_bell_duration 0.0
window_alert_on_bell no
bell_on_tab        "🔔 "

# --- Performance ---
repaint_delay   10
input_delay     3
sync_to_monitor yes

# --- Opções de terminal ---
term xterm-kitty
shell_integration enabled

# ============================================================
#  Cores — paleta macOS Dark (alinhada com WhiteSur-Dark)
# ============================================================

# Fundo e texto principal
background            #1c1c1e
foreground            #f2f2f7
selection_background  #3d3d42
selection_foreground  #f2f2f7

# Cursor
cursor                #f2f2f7
cursor_text_color     #1c1c1e

# Cores de URL
url_color             #0a84ff

# --- Preto ---
color0   #2c2c2e
color8   #48484a

# --- Vermelho ---
color1   #ff453a
color9   #ff6961

# --- Verde ---
color2   #30d158
color10  #34c759

# --- Amarelo ---
color3   #ffd60a
color11  #ffd930

# --- Azul ---
color4   #0a84ff
color12  #409cff

# --- Magenta / Roxo ---
color5   #bf5af2
color13  #da8fff

# --- Ciano ---
color6   #64d2ff
color14  #70d7ff

# --- Branco ---
color7   #ebebf0
color15  #f2f2f7

# --- Tabs ---
active_tab_background    #2c2c2e
active_tab_foreground    #f2f2f7
inactive_tab_background  #1c1c1e
inactive_tab_foreground  #636366
tab_bar_background       #1c1c1e
tab_bar_margin_color     #1c1c1e

# ============================================================
#  Atalhos personalizados
# ============================================================

# Limpar atalhos padrão que colidem
clear_all_shortcuts no

# Copiar / Colar
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+s paste_from_selection

# Fonte: aumentar/diminuir
map ctrl+equal     change_font_size all +1.0
map ctrl+minus     change_font_size all -1.0
map ctrl+0         change_font_size all 0

# Abas
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+tab        next_tab
map ctrl+shift+tab  previous_tab
map ctrl+1          goto_tab 1
map ctrl+2          goto_tab 2
map ctrl+3          goto_tab 3
map ctrl+4          goto_tab 4
map ctrl+5          goto_tab 5

# Dividir janela (splits)
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+]     next_window
map ctrl+shift+[     previous_window
map ctrl+shift+f5    start_resizing_window

# Rolagem
map shift+page_up   scroll_page_up
map shift+page_down scroll_page_down
map shift+home      scroll_home
map shift+end       scroll_end
map ctrl+shift+h    show_scrollback

# Fullscreen
map f11 toggle_fullscreen

# Recarregar config sem fechar
map ctrl+shift+F5 load_config_file
