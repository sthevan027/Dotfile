# ============================================================
#  Hyprlock — tela de bloqueio (WhiteSur-Dark)
# ============================================================

general {
    disable_loading_bar = true
    hide_cursor         = true
    grace               = 0
}

background {
    monitor     =
    color       = rgba(18, 18, 20, 1.0)
    blur_size   = 7
    blur_passes = 3
    noise       = 0.02
}

label {
    monitor   =
    text      = cmd[update:1000] echo "$(date +'%H:%M')"
    color     = rgba(255, 255, 255, 0.90)
    font_size = 72
    font_family = JetBrains Mono Bold
    position  = 0, 60
    halign    = center
    valign    = center
}

label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color     = rgba(255, 255, 255, 0.55)
    font_size = 18
    font_family = JetBrains Mono
    position  = 0, -20
    halign    = center
    valign    = center
}

input-field {
    monitor         =
    size            = 280, 48
    position        = 0, -140
    halign          = center
    valign          = center

    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.20

    outer_color       = rgba(108, 108, 112, 0.6)
    inner_color       = rgba(44, 44, 46, 0.80)
    font_color        = rgba(255, 255, 255, 0.90)
    fade_on_empty     = true
    placeholder_text  = <i>Senha...</i>

    check_color       = rgba(48, 209, 88, 0.9)
    fail_color        = rgba(255, 69, 58, 0.9)
    fail_text         = <i>$FAIL <b>($ATTEMPTS)</b></i>

    capslock_color    = rgba(255, 214, 10, 0.9)
    rounding          = 12
}
